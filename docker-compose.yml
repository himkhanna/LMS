name: lms

# One command starts everything:  docker compose up
#
# Postgres for every service + the three core backends + the Next.js frontend.
# Hot-reload is NOT available in this mode (everything is built once); use the
# ./scripts/start-dev.sh + npm run dev flow if you want hot-reload during dev.

x-pg-health: &pg-health
  test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
  interval: 5s
  timeout: 5s
  retries: 10

x-jwt-secret: &jwt-secret
  JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-please-32+chars-needed-for-hs256}

services:
  # ---- Databases ----
  course-db:
    image: postgres:16-alpine
    container_name: lms-course-db
    environment: { POSTGRES_DB: course, POSTGRES_USER: course, POSTGRES_PASSWORD: course }
    ports: ["5532:5432"]
    volumes: [course_pg:/var/lib/postgresql/data]
    healthcheck: *pg-health

  ai-gateway-db:
    image: postgres:16-alpine
    container_name: lms-ai-gateway-db
    environment: { POSTGRES_DB: ai_gateway, POSTGRES_USER: ai, POSTGRES_PASSWORD: ai }
    ports: ["5533:5432"]
    volumes: [ai_gateway_pg:/var/lib/postgresql/data]
    healthcheck: *pg-health

  auth-db:
    image: postgres:16-alpine
    container_name: lms-auth-db
    environment: { POSTGRES_DB: auth, POSTGRES_USER: auth, POSTGRES_PASSWORD: auth }
    ports: ["5534:5432"]
    volumes: [auth_pg:/var/lib/postgresql/data]
    healthcheck: *pg-health

  # ---- Backend services ----
  auth-service:
    build: ./services/auth-service
    container_name: lms-auth-service
    depends_on:
      auth-db: { condition: service_healthy }
    environment:
      <<: *jwt-secret
      AUTH_DB_URL: jdbc:postgresql://auth-db:5432/auth
      AUTH_DB_USER: auth
      AUTH_DB_PASSWORD: auth
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@idc.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-AdminPass!123}
      MS_TENANT_ID: ${MS_TENANT_ID:-common}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
    ports: ["8083:8083"]

  course-service:
    build: ./services/course-service
    container_name: lms-course-service
    depends_on:
      course-db: { condition: service_healthy }
      ai-gateway-service: { condition: service_started }
    environment:
      <<: *jwt-secret
      COURSE_DB_URL: jdbc:postgresql://course-db:5432/course
      COURSE_DB_USER: course
      COURSE_DB_PASSWORD: course
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      AI_GATEWAY_URL: http://ai-gateway-service:8082
      STORAGE_LOCAL_ROOT: /var/lib/lms/assets
    volumes: [course_assets:/var/lib/lms/assets]
    ports: ["8081:8081"]

  ai-gateway-service:
    build: ./services/ai-gateway-service
    container_name: lms-ai-gateway-service
    depends_on:
      ai-gateway-db: { condition: service_healthy }
    environment:
      <<: *jwt-secret
      AI_DB_URL: jdbc:postgresql://ai-gateway-db:5432/ai_gateway
      AI_DB_USER: ai
      AI_DB_PASSWORD: ai
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports: ["8082:8082"]

  # ---- Frontend ----
  web:
    build: ./apps/web
    container_name: lms-web
    depends_on:
      - auth-service
      - course-service
      - ai-gateway-service
    ports: ["3000:3000"]

volumes:
  course_pg: {}
  ai_gateway_pg: {}
  auth_pg: {}
  course_assets: {}
