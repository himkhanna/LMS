spring:
  application: { name: search-service }
  datasource:
    url: ${SEARCH_DB_URL:jdbc:postgresql://localhost:5442/searchdb}
    username: ${SEARCH_DB_USER:searchdb}
    password: ${SEARCH_DB_PASSWORD:searchdb}
  jpa: { hibernate: { ddl-auto: validate }, open-in-view: false }
  flyway: { enabled: true, locations: classpath:db/migration }
server: { port: ${SERVER_PORT:8091} }
app:
  jwt: { secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256} }
  cors: { allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000} }
management.endpoints.web.exposure.include: health,info,metrics
