spring:
  application: { name: assessment-service }
  datasource:
    url: ${ASSESSMENT_DB_URL:jdbc:postgresql://localhost:5437/assessment}
    username: ${ASSESSMENT_DB_USER:assessment}
    password: ${ASSESSMENT_DB_PASSWORD:assessment}
  jpa: { hibernate: { ddl-auto: validate }, open-in-view: false }
  flyway: { enabled: true, locations: classpath:db/migration }
server: { port: ${SERVER_PORT:8086} }
app:
  jwt: { secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256} }
  cors: { allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000} }
management.endpoints.web.exposure.include: health,info,metrics
