spring:
  application: { name: analytics-service }
  datasource:
    url: ${ANALYTICS_DB_URL:jdbc:postgresql://localhost:5439/analytics}
    username: ${ANALYTICS_DB_USER:analytics}
    password: ${ANALYTICS_DB_PASSWORD:analytics}
  jpa: { hibernate: { ddl-auto: validate }, open-in-view: false }
  flyway: { enabled: true, locations: classpath:db/migration }
server: { port: ${SERVER_PORT:8088} }
app:
  jwt: { secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256} }
  cors: { allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000} }
management.endpoints.web.exposure.include: health,info,metrics
