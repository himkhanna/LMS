services:
  postgres:
    image: postgres:16-alpine
    container_name: analytics-service-postgres
    environment: { POSTGRES_DB: analytics, POSTGRES_USER: analytics, POSTGRES_PASSWORD: analytics }
    ports: ["5439:5432"]
    volumes: [analytics_pg:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"], interval: 5s, timeout: 5s, retries: 10 }
volumes: { analytics_pg: {} }
