spring:
  application: { name: user-service }
  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5435/users}
    username: ${USER_DB_USER:users}
    password: ${USER_DB_PASSWORD:users}
  jpa: { hibernate: { ddl-auto: validate }, open-in-view: false }
  flyway: { enabled: true, locations: classpath:db/migration }
server: { port: ${SERVER_PORT:8084} }
app:
  jwt: { secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256} }
  cors: { allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000} }
management.endpoints.web.exposure.include: health,info,metrics
