services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment: { POSTGRES_DB: auth, POSTGRES_USER: auth, POSTGRES_PASSWORD: auth }
    ports: ["5434:5432"]
    volumes: [auth_pg:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U auth -d auth"], interval: 5s, timeout: 5s, retries: 10 }
volumes: { auth_pg: {} }
