spring:
  application: { name: auth-service }
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5434/auth}
    username: ${AUTH_DB_USER:auth}
    password: ${AUTH_DB_PASSWORD:auth}
  jpa:
    hibernate: { ddl-auto: validate }
    open-in-view: false
  flyway: { enabled: true, locations: classpath:db/migration }
server: { port: ${SERVER_PORT:8083} }
app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256}
    issuer: auth-service
    expiry-seconds: 28800
  cors: { allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000} }
  auth:
    local-accounts:
      enabled: ${AUTH_LOCAL_ACCOUNTS_ENABLED:false}
    microsoft:
      tenant-id: ${MS_TENANT_ID:common}
      client-id: ${MS_CLIENT_ID:}
      client-secret: ${MS_CLIENT_SECRET:}
management.endpoints.web.exposure.include: health,info,metrics
