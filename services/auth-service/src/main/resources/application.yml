spring:
  application: { name: auth-service }
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5434/auth}
    username: ${AUTH_DB_USER:auth}
    password: ${AUTH_DB_PASSWORD:auth}
  jpa:
    hibernate: { ddl-auto: validate }
    open-in-view: false
  flyway: { enabled: true, locations: classpath:db/migration }
server:
  port: ${SERVER_PORT:8083}
app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256}
    issuer: auth-service
    expiry-seconds: 28800
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    self-register:
      enabled: ${AUTH_SELF_REGISTER_ENABLED:false}
    bootstrap-admin:
      email: ${BOOTSTRAP_ADMIN_EMAIL:}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    microsoft:
      tenant-id: ${MS_TENANT_ID:common}
      client-id: ${MS_CLIENT_ID:}
      client-secret: ${MS_CLIENT_SECRET:}
      # When true (default), each login refreshes the user's role from the
      # id_token's `roles` + `groups` claims. Set to false to ignore Entra
      # claims and manage roles purely in-app via /admin/users.
      role-sync: ${MS_ROLE_SYNC:true}
      # App role values on the Entra registration are conventionally
      # prefixed (e.g. LMS_ADMIN). RoleMapper strips this prefix.
      app-role-prefix: ${MS_APP_ROLE_PREFIX:LMS_}
      # Optional: Entra security group object IDs that map to roles.
      # App roles win over groups when both apply.
      group-admin: ${MS_GROUP_ADMIN:}
      group-hr: ${MS_GROUP_HR:}
      group-instructor: ${MS_GROUP_INSTRUCTOR:}
management.endpoints.web.exposure.include: health,info,metrics
