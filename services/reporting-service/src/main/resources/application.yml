spring:
  application: { name: reporting-service }
  datasource:
    url: ${REPORTING_DB_URL:jdbc:postgresql://localhost:5441/reporting}
    username: ${REPORTING_DB_USER:reporting}
    password: ${REPORTING_DB_PASSWORD:reporting}
  jpa: { hibernate: { ddl-auto: validate }, open-in-view: false }
  flyway: { enabled: true, locations: classpath:db/migration }
server: { port: ${SERVER_PORT:8090} }
app:
  jwt: { secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256} }
  cors: { allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000} }
management.endpoints.web.exposure.include: health,info,metrics
