spring:
  application: { name: ai-orchestration-service }
  datasource:
    url: ${AIORCH_DB_URL:jdbc:postgresql://localhost:5436/aiorch}
    username: ${AIORCH_DB_USER:aiorch}
    password: ${AIORCH_DB_PASSWORD:aiorch}
  jpa: { hibernate: { ddl-auto: validate }, open-in-view: false }
  flyway: { enabled: true, locations: classpath:db/migration }
server: { port: ${SERVER_PORT:8085} }
app:
  jwt: { secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256} }
  cors: { allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000} }
management.endpoints.web.exposure.include: health,info,metrics
