spring:
  application: { name: workflow-service }
  datasource:
    url: ${WORKFLOW_DB_URL:jdbc:postgresql://localhost:5440/workflow}
    username: ${WORKFLOW_DB_USER:workflow}
    password: ${WORKFLOW_DB_PASSWORD:workflow}
  jpa: { hibernate: { ddl-auto: validate }, open-in-view: false }
  flyway: { enabled: true, locations: classpath:db/migration }
server: { port: ${SERVER_PORT:8089} }
app:
  jwt: { secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256} }
  cors: { allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000} }
management.endpoints.web.exposure.include: health,info,metrics
