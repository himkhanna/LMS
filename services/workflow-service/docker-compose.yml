services:
  postgres:
    image: postgres:16-alpine
    container_name: workflow-service-postgres
    environment: { POSTGRES_DB: workflow, POSTGRES_USER: workflow, POSTGRES_PASSWORD: workflow }
    ports: ["5440:5432"]
    volumes: [workflow_pg:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U workflow -d workflow"], interval: 5s, timeout: 5s, retries: 10 }
volumes: { workflow_pg: {} }
