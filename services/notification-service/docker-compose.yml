services:
  postgres:
    image: postgres:16-alpine
    container_name: notification-service-postgres
    environment: { POSTGRES_DB: notification, POSTGRES_USER: notification, POSTGRES_PASSWORD: notification }
    ports: ["5438:5432"]
    volumes: [notification_pg:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U notification -d notification"], interval: 5s, timeout: 5s, retries: 10 }
volumes: { notification_pg: {} }
