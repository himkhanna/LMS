services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-gateway-postgres
    environment:
      POSTGRES_DB: ai_gateway
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
    ports:
      - "5433:5432"
    volumes:
      - ai_gateway_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d ai_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ai_gateway_pg_data:
