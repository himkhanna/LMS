spring:
  application:
    name: ai-gateway-service
  datasource:
    url: ${AI_DB_URL:jdbc:postgresql://localhost:5433/ai_gateway}
    username: ${AI_DB_USER:ai}
    password: ${AI_DB_PASSWORD:ai}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8082}

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  ai:
    http-timeout-seconds: ${AI_HTTP_TIMEOUT:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.lms.ai: INFO
