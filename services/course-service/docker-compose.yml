services:
  postgres:
    image: postgres:16-alpine
    container_name: course-postgres
    environment:
      POSTGRES_DB: course
      POSTGRES_USER: course
      POSTGRES_PASSWORD: course
    ports:
      - "5432:5432"
    volumes:
      - course_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U course -d course"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  course_pg_data:
