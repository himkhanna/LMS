spring:
  application:
    name: course-service
  datasource:
    url: ${COURSE_DB_URL:jdbc:postgresql://localhost:5432/course}
    username: ${COURSE_DB_USER:course}
    password: ${COURSE_DB_PASSWORD:course}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

server:
  port: ${SERVER_PORT:8081}

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256}
  ai-gateway:
    base-url: ${AI_GATEWAY_URL:http://localhost:8082}
    # Long enough for slow local models (Ollama on CPU can take minutes
    # for a structured JSON response). Cloud providers respond in seconds.
    timeout-seconds: ${AI_GATEWAY_TIMEOUT:600}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local:
      root: ${STORAGE_LOCAL_ROOT:./data/assets}
    azure:
      connection-string: ${AZURE_BLOB_CONN:}
      container: ${AZURE_BLOB_CONTAINER:lms-assets}
  notify:
    email:
      # When enabled (default) and MS_TENANT_ID / MS_CLIENT_ID /
      # MS_CLIENT_SECRET are set on the same Entra ID app with Mail.Send
      # application permission, sends real email via Microsoft Graph.
      # Otherwise EmailSender stays in log-only mode so the workflow loop
      # remains testable in dev.
      enabled: ${NOTIFY_EMAIL_ENABLED:true}
      from: ${NOTIFY_EMAIL_FROM:}
      from-name: ${NOTIFY_EMAIL_FROM_NAME:IDC Digital Learning}
    reminder-cron: ${NOTIFY_REMINDER_CRON:0 0 9 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
