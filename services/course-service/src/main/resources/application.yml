spring:
  application:
    name: course-service
  datasource:
    url: ${COURSE_DB_URL:jdbc:postgresql://localhost:5432/course}
    username: ${COURSE_DB_USER:course}
    password: ${COURSE_DB_PASSWORD:course}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

server:
  port: ${SERVER_PORT:8081}

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-needed-for-hs256}
  ai-gateway:
    base-url: ${AI_GATEWAY_URL:http://localhost:8082}
    timeout-seconds: ${AI_GATEWAY_TIMEOUT:120}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local:
      root: ${STORAGE_LOCAL_ROOT:./data/assets}
    azure:
      connection-string: ${AZURE_BLOB_CONN:}
      container: ${AZURE_BLOB_CONTAINER:lms-assets}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
